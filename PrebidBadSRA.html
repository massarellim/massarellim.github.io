<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Example demonstrating how SRA (Single Request Architecture) can create a performance bottleneck when one bidder is slow.">
  <title>Prebid SRA Bottleneck Demonstration</title>
  
  <script async src="//securepubads.g.doubleclick.net/tag/js/gpt.js"></script>
  <script async src="//cdn.jsdelivr.net/npm/prebid.js@latest/dist/not-for-prod/prebid.js"></script>
  
  <!-- JavaScript at the top -->
  <script>
    var googletag = googletag || {};
    googletag.cmd = googletag.cmd || [];
    var pbjs = pbjs || {};
    pbjs.cmd = pbjs.cmd || [];

    let requestedTimestamp = Date.now();

    function logEvent(message, className = "") {
      const body = document.getElementById("logBody");
      if (!body) return;
      
      const row = document.createElement("tr");
      
      const eventCell = document.createElement("td");
      if (className) eventCell.className = className;
      eventCell.textContent = message;
      
      const timeCell = document.createElement("td");
      timeCell.className = "timestamp";
      timeCell.textContent = `${Date.now() - requestedTimestamp}ms`;
      
      row.appendChild(eventCell);
      row.appendChild(timeCell);
      body.appendChild(row);
    }

    // Helper to generate random bids once on load
    function getRandomBid() {
      return (Math.floor(Math.random() * 41) + 10) / 100;
    }

    // Prebid configuration
    pbjs.cmd.push(function() {
      // Setup 4 ad units
      let adUnits = [];
      for (let i = 1; i <= 4; i++) {
        let bids = [
          { bidder: 'appnexus', params: { placementId: 123 } },
          { bidder: 'rubicon', params: { accountId: 1, siteId: 2, zoneId: 3 } },
          { bidder: 'pubmatic', params: { publisherId: '1' } }
        ];
        if (i === 4) bids.push({ bidder: 'openx', params: { unit: '1', delDomain: 'example-d.openx.net' } });

        adUnits.push({
          code: 'div-gpt-ad-' + i,
          mediaTypes: { banner: { sizes: [300, 250] } },
          bids: bids
        });
      }
      pbjs.addAdUnits(adUnits);

      const creativeHtml = '<div style="display: inline-block; height: 250px; width: 300px; background-image: url(https://vcdn.adnxs.com/p/creative-image/27/c0/52/67/27c05267-5a6d-4874-834e-18e218493c32.png); background-size: 300px; background-repeat: repeat-x"></div>';

      // Setup Intercepts (Mirroring working pattern from PrebidEndFaster.html)
      let bds = ['appnexus', 'rubicon', 'pubmatic', 'openx'];
      let ints = [];
      
      bds.forEach(bidder => {
          let isSlow = (bidder === 'openx');
          let delay = isSlow ? 3000 : Math.floor(Math.random() * 301) + 500;
          
          ints.push({
              when: function(bidRequest) { return bidRequest.bidder === bidder; },
              options: { delay: delay },
              then: function(bidRequest) {
                  let cpm = isSlow ? 0.01 : (Math.floor(Math.random() * 41) + 10) / 100;
                  return {
                      cpm: cpm,
                      width: 300,
                      height: 250,
                      creativeId: 'cr-' + bidder,
                      netRevenue: true,
                      currency: 'USD',
                      ttl: 300,
                      ad: creativeHtml
                  };
              }
          });
      });

      pbjs.setConfig({
        bidderSequence: "fixed",
        priceGranularity: "high",
        bidderTimeout: 3000,
        debugging: {
          enabled: true,
          intercept: ints
        }
      });
    });

    // GPT Configuration
    googletag.cmd.push(function() {
      for (let i = 1; i <= 4; i++) {
        googletag.defineSlot('/6353/massarellim_test', [300, 250], 'div-gpt-ad-' + i).addService(googletag.pubads());
      }
      
      googletag.pubads().addEventListener('slotRenderEnded', function(event) {
        logEvent(`Slot ${event.slot.getSlotElementId()} finished rendering.`, "highlight-success");
      });
      
      googletag.pubads().enableSingleRequest();
      googletag.pubads().disableInitialLoad();
      googletag.enableServices();
    });

    function startSimulation() {
      const logBody = document.getElementById("logBody");
      if (!logBody) return;
      
      logBody.innerHTML = "";
      requestedTimestamp = Date.now();
      logEvent("Simulation started. Auction requested.");

      pbjs.cmd.push(function() {
        // Monitor bidder responses
        pbjs.onEvent('bidderDone', function(bidderData) {
          const isSlow = bidderData.bidderCode === 'openx';
          const msg = isSlow ? `Bidder ${bidderData.bidderCode} responded (SLOWEST).` : `Bidder ${bidderData.bidderCode} responded.`;
          logEvent(msg, isSlow ? "highlight-danger" : "");
        });

        pbjs.requestBids({
          bidsBackHandler: function() {
            logEvent("Prebid bidsBackHandler executed. All bids ready.", "highlight-success");
            
            googletag.cmd.push(function() {
              pbjs.que.push(function() {
                pbjs.setTargetingForGPTAsync();
                logEvent("GPT Targeting set. Fetching SRA ad response...", "highlight-success");
                googletag.pubads().refresh();
              });
            });
          }
        });
      });
    }
  </script>
  
  <style>
    :root {
      --bg-color: #f8f9fa;
      --text-color: #202124;
      --accent-color: #1a73e8;
      --border-color: #dadce0;
      --danger-color: #d93025;
      --success-color: #188038;
    }

    body {
      font-family: 'Roboto', 'Inter', system-ui, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      width: 100%;
      background: #ffffff;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 1px 3px rgba(60,64,67,0.3), 0 4px 8px 3px rgba(60,64,67,0.15);
      border: 1px solid var(--border-color);
    }

    /* Two Column Layout */
    .two-column-layout {
      display: grid;
      grid-template-columns: 680px 1fr; /* 2 columns of 330px + gap = 680px */
      gap: 30px;
      margin-top: 20px;
      align-items: start;
    }

    /* Left Column (Ads) */
    .ad-grid {
      display: grid;
      grid-template-columns: repeat(2, 330px); /* Made columns wider to accommodate padding */
      gap: 20px;
    }

    .ad-slot-container {
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 15px;
      text-align: center;
      background-color: #ffffff;
    }

    .ad-slot-container h3 {
      font-size: 0.85rem;
      font-weight: 500;
      color: #5f6368;
      margin-top: 0;
      margin-bottom: 10px;
    }

    .ad-placeholder {
      width: 300px;
      height: 250px;
      background: #f1f3f4;
      border: 2px dashed #bdc1c6;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto;
      color: #70757a;
      font-size: 0.85rem;
      border-radius: 4px;
      overflow: hidden; /* Prevent overflowing */
    }

    /* Right Column (Log) */
    .log-section {
      background-color: #ffffff;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 20px;
      height: 600px;
      overflow-y: auto;
    }

    .log-section h2 {
      font-size: 1.1rem;
      font-weight: 500;
      margin-top: 0;
      margin-bottom: 15px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    th, td {
      text-align: left;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border-color);
    }

    th {
      background-color: #f8f9fa;
      font-weight: 500;
      color: #5f6368;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .timestamp {
      color: #5f6368;
      font-family: 'Courier New', Courier, monospace;
      text-align: right;
    }

    .highlight-danger {
      color: var(--danger-color);
      font-weight: bold;
    }

    .highlight-success {
      color: var(--success-color);
      font-weight: bold;
    }

    .btn {
      background-color: var(--accent-color);
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 4px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3);
      transition: background 0.2s;
    }

    .btn:hover {
      background-color: #1765c1;
    }
  </style>
</head>
<body>

  <div class="container">
    
    <!-- Two Column Layout -->
    <div class="two-column-layout">
      
      <!-- Left Column (Ads) -->
      <div class="ad-grid">
        <div class="ad-slot-container">
          <h3>Slot 1</h3>
          <div id="div-gpt-ad-1" class="ad-placeholder"></div>
        </div>
        <div class="ad-slot-container">
          <h3>Slot 2</h3>
          <div id="div-gpt-ad-2" class="ad-placeholder"></div>
        </div>
        <div class="ad-slot-container">
          <h3>Slot 3</h3>
          <div id="div-gpt-ad-3" class="ad-placeholder"></div>
        </div>
        <div class="ad-slot-container">
          <h3>Slot 4</h3>
          <div id="div-gpt-ad-4" class="ad-placeholder"></div>
        </div>
      </div>

      <!-- Right Column (Log) -->
      <div class="log-section">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-bottom: 15px;">
          <h2 style="margin: 0; border: none; padding: 0; font-size: 1.1rem; font-weight: 500;">Live Event Timeline</h2>
          <button class="btn" onclick="startSimulation()">Request Ads</button>
        </div>
        <table>
          <thead>
            <tr>
              <th>Event</th>
              <th style="text-align: right;">Time</th>
            </tr>
          </thead>
          <tbody id="logBody">
            <!-- Logs will appear here -->
          </tbody>
        </table>
      </div>

    </div>
  </div>

</body>
</html>
