<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prebid SRA Bottleneck Demonstration</title>
  
  <script async src="//securepubads.g.doubleclick.net/tag/js/gpt.js"></script>
  <script async src="//cdn.jsdelivr.net/npm/prebid.js@latest/dist/not-for-prod/prebid.js"></script>
  
  <script>
    var googletag = googletag || {};
    googletag.cmd = googletag.cmd || [];
    var pbjs = pbjs || {};
    pbjs.cmd = pbjs.cmd || [];

    let requestedTimestamp = Date.now();
    let lastFastTimestamp = 0;
    let openxTimestamp = 0;
    let isSRAMode = false;
    let biddersLogged = {}; 

    const urlParams = new URLSearchParams(window.location.search);
    isSRAMode = urlParams.get('sra') !== 'false';

    function logEvent(message, className = "") {
      const body = document.getElementById("logBody");
      if (!body) return;
      
      const row = document.createElement("tr");
      const eventCell = document.createElement("td");
      if (className) eventCell.className = className;
      eventCell.textContent = message;
      
      const timeCell = document.createElement("td");
      timeCell.className = "timestamp";
      timeCell.textContent = `${Date.now() - requestedTimestamp}ms`;
      
      row.appendChild(eventCell);
      row.appendChild(timeCell);
      body.appendChild(row);
    }

    // Prebid configuration
    pbjs.cmd.push(function() {
      let adUnits = [];
      for (let i = 2; i <= 4; i++) {
        let bids = [
          { bidder: 'appnexus', params: { placementId: 123 } },
          { bidder: 'rubicon', params: { accountId: 1, siteId: 2, zoneId: 3 } },
          { bidder: 'pubmatic', params: { publisherId: '1' } }
        ];
        if (i === 4) bids.push({ bidder: 'openx', params: { unit: '1', delDomain: 'example-d.openx.net' } });

        adUnits.push({
          code: 'div-gpt-ad-' + i,
          mediaTypes: { banner: { sizes: [300, 250] } },
          bids: bids
        });
      }
      pbjs.addAdUnits(adUnits);

      const creativeHtml = '<div style="display: inline-block; height: 250px; width: 300px; background-image: url(https://vcdn.adnxs.com/p/creative-image/27/c0/52/67/27c05267-5a6d-4874-834e-18e218493c32.png); background-size: 300px; background-repeat: repeat-x"></div>';

      pbjs.setConfig({
        bidderSequence: "fixed",
        priceGranularity: "high",
        bidderTimeout: 3500,
        debugging: {
          enabled: true,
          intercept: [
            {
              when: function(bidRequest) { let b = bidRequest.bidder || bidRequest.bidderCode; return b === 'appnexus'; },
              options: { delay: Math.floor(Math.random() * 301) + 500 },
              then: function() { return { cpm: (Math.floor(Math.random() * 41) + 10) / 100, width: 300, height: 250, creativeId: 'cr-appnexus', netRevenue: true, currency: 'USD', ttl: 300, ad: creativeHtml }; }
            },
            {
              when: function(bidRequest) { let b = bidRequest.bidder || bidRequest.bidderCode; return b === 'rubicon'; },
              options: { delay: Math.floor(Math.random() * 301) + 500 },
              then: function() { return { cpm: (Math.floor(Math.random() * 41) + 10) / 100, width: 300, height: 250, creativeId: 'cr-rubicon', netRevenue: true, currency: 'USD', ttl: 300, ad: creativeHtml }; }
            },
            {
              when: function(bidRequest) { let b = bidRequest.bidder || bidRequest.bidderCode; return b === 'pubmatic'; },
              options: { delay: Math.floor(Math.random() * 301) + 500 },
              then: function() { return { cpm: (Math.floor(Math.random() * 41) + 10) / 100, width: 300, height: 250, creativeId: 'cr-pubmatic', netRevenue: true, currency: 'USD', ttl: 300, ad: creativeHtml }; }
            },
            {
              when: function(bidRequest) { let b = bidRequest.bidder || bidRequest.bidderCode; return b === 'openx'; },
              options: { delay: 3000 },
              then: { cpm: 0.01, width: 300, height: 250, creativeId: 'cr-openx', netRevenue: true, currency: 'USD', ttl: 300, ad: creativeHtml }
            }
          ]
        }
      });

      pbjs.onEvent('bidderDone', function(bidderData) {
        let bidder = bidderData.bidderCode;
        if (!biddersLogged[bidder]) {
            biddersLogged[bidder] = true;
            const isSlow = bidder === 'openx';
            const now = Date.now();
            if (isSlow) { openxTimestamp = now; } 
            else { lastFastTimestamp = Math.max(lastFastTimestamp, now); }
            
            const msg = isSlow ? `Bidder ${bidder} responded (TIMEOUT).` : `Bidder ${bidder} responded.`;
            logEvent(msg, isSlow ? "highlight-danger" : "");
        }
      });
    });

    // GPT Configuration (Unified with Simulation for access to local map)
    googletag.cmd.push(function() {
      for (let i = 1; i <= 4; i++) {
        let slot = googletag.defineSlot('/6353/massarellim_test', [300, 250], 'div-gpt-ad-' + i).addService(googletag.pubads());
        if (i === 1) { slot.setTargeting('test', 'red_mustang'); }
        googletag.display('div-gpt-ad-' + i);
      }
      
      // Local map exactly like LL_HB_IO
      var slotsMap = googletag.pubads().getSlots().reduce((o, key) => ({ ...o, [key.getSlotElementId()]: key}), {});

      if (isSRAMode) { googletag.pubads().enableSingleRequest(); }
      googletag.pubads().disableInitialLoad();
      googletag.enableServices();

      // Define simulation inside to access slotsMap
      window.startSimulation = function() {
        const logBody = document.getElementById("logBody");
        if (!logBody) return;
        
        logBody.innerHTML = "";
        requestedTimestamp = Date.now();
        lastFastTimestamp = 0;
        openxTimestamp = 0;
        biddersLogged = {}; 
        
        logEvent("Auction requested.");

        if (isSRAMode) {
            pbjs.cmd.push(function() {
              pbjs.requestBids({
                bidsBackHandler: function() {
                  pbjs.que.push(function() {
                    pbjs.setTargetingForGPTAsync();
                    googletag.pubads().refresh();
                    setTimeout(() => {
                        logEvent("All slots rendered", "highlight-success");
                        const exactDelay = openxTimestamp - lastFastTimestamp;
                        logEvent(`SRA Bottleneck: All slots were delayed by ${exactDelay}ms waiting for OpenX on Slot 4.`, "highlight-warning");
                    }, 200);
                  });
                }
              });
            });
        } else {
            // Non-SRA Mode using local map
            googletag.pubads().refresh([slotsMap['div-gpt-ad-1']]);
            setTimeout(() => { logEvent("Slot 1 rendered", "highlight-success"); }, 200);

            pbjs.cmd.push(function() {
              pbjs.requestBids({
                adUnitCodes: ['div-gpt-ad-2', 'div-gpt-ad-3'],
                bidsBackHandler: function() {
                  pbjs.que.push(function() {
                    pbjs.setTargetingForGPTAsync(['div-gpt-ad-2', 'div-gpt-ad-3']);
                    googletag.pubads().refresh([slotsMap['div-gpt-ad-2'], slotsMap['div-gpt-ad-3']]);
                    setTimeout(() => {
                        logEvent("Slot 2 rendered", "highlight-success");
                        logEvent("Slot 3 rendered", "highlight-success");
                    }, 200);
                  });
                }
              });
            });

            pbjs.cmd.push(function() {
              pbjs.requestBids({
                adUnitCodes: ['div-gpt-ad-4'],
                bidsBackHandler: function() {
                  pbjs.que.push(function() {
                    pbjs.setTargetingForGPTAsync(['div-gpt-ad-4']);
                    googletag.pubads().refresh([slotsMap['div-gpt-ad-4']]);
                    setTimeout(() => { logEvent("Slot 4 rendered", "highlight-success"); }, 200);
                  });
                }
              });
            });
        }
      };

      // Auto-start
      window.startSimulation();
    });

    function setMode(mode) {
        if (mode === 'nonsra') { window.location.search = '?sra=false'; } 
        else { window.location.search = ''; }
    }
  </script>
  
  <style>
    :root {
      --bg-color: #f8f9fa;
      --text-color: #202124;
      --accent-color: #1a73e8;
      --border-color: #dadce0;
      --danger-color: #d93025;
      --success-color: #188038;
    }

    body {
      font-family: 'Roboto', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      max-width: 1200px;
      width: 100%;
      background: #ffffff;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 1px 3px rgba(60,64,67,0.3);
      border: 1px solid var(--border-color);
    }

    .two-column-layout {
      display: grid;
      grid-template-columns: 680px 1fr;
      gap: 30px;
      margin-top: 20px;
      align-items: start;
    }

    .ad-grid {
      display: grid;
      grid-template-columns: repeat(2, 330px);
      gap: 20px;
    }

    .ad-slot-container {
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 15px;
      text-align: center;
    }

    .ad-slot-container h3 {
      font-size: 0.85rem;
      font-weight: 500;
      color: #5f6368;
      margin: 0 0 10px 0;
    }

    .ad-placeholder {
      width: 300px;
      height: 250px;
      background: #f1f3f4;
      border: 2px dashed #bdc1c6;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto;
      border-radius: 4px;
      overflow: hidden;
    }

    .log-section {
      background-color: #ffffff;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 20px;
      height: 600px;
      overflow-y: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    th, td {
      text-align: left;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border-color);
    }

    th {
      background-color: #f8f9fa;
      font-weight: 500;
      color: #5f6368;
    }

    .timestamp {
      color: #5f6368;
      font-family: monospace;
      text-align: right;
    }

    .highlight-danger { color: var(--danger-color); font-weight: bold; }
    .highlight-warning { color: #f2a600; font-weight: bold; }
    .highlight-success { color: var(--success-color); font-weight: bold; }

    .btn {
      background-color: var(--accent-color);
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 4px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
    }
    
    .btn-secondary {
      background-color: #ffffff;
      color: var(--accent-color);
      border-color: var(--border-color);
    }
  </style>
</head>
<body>

  <div class="container">
    
    <div class="two-column-layout">
      
      <div class="ad-grid">
        <div class="ad-slot-container">
          <h3>Slot 1</h3>
          <div id="div-gpt-ad-1" class="ad-placeholder"></div>
        </div>
        <div class="ad-slot-container">
          <h3>Slot 2</h3>
          <div id="div-gpt-ad-2" class="ad-placeholder"></div>
        </div>
        <div class="ad-slot-container">
          <h3>Slot 3</h3>
          <div id="div-gpt-ad-3" class="ad-placeholder"></div>
        </div>
        <div class="ad-slot-container">
          <h3>Slot 4</h3>
          <div id="div-gpt-ad-4" class="ad-placeholder"></div>
        </div>
      </div>

      <div class="log-section">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-bottom: 15px;">
          <h2 style="margin: 0; font-size: 1.1rem; font-weight: 500;">Live Event Timeline</h2>
          <div style="display: flex; gap: 10px;">
            <button class="btn" id="sraBtn" onclick="setMode('sra')">Run SRA</button>
            <button class="btn btn-secondary" id="nonSraBtn" onclick="setMode('nonsra')">Run Non-SRA</button>
          </div>
        </div>
        <table>
          <thead>
            <tr>
              <th>Event</th>
              <th style="text-align: right;">Time</th>
            </tr>
          </thead>
          <tbody id="logBody">
            <!-- Logs will appear here -->
          </tbody>
        </table>
      </div>

    </div>
  </div>

</body>
</html>
