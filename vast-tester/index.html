<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple CTV VAST Tester</title>
    
    <!-- Google Fonts (Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Video.js, Contrib-Ads, and IMA Styles -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/videojs-contrib-ads/7.1.0/videojs.ads.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/videojs-ima/2.1.0/videojs.ima.css" rel="stylesheet" />
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Fake CMP removed as requested -->


    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-color: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.3);
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --success-color: #10b981;
            --error-color: #ef4444;
            --warning-color: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: -0.025em;
        }

        .logo i {
            color: var(--accent-color);
            filter: drop-shadow(0 0 8px var(--accent-glow));
        }

        .subtitle {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        main {
            flex: 1;
            display: flex;
            padding: 1.5rem;
            gap: 1.5rem;
            height: calc(100vh - 70px);
            overflow: hidden;
        }

        /* Sidebar / Config */
        .sidebar {
            flex: 0 0 380px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            height: 100%;
            overflow-y: auto;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
            font-weight: 600;
            font-size: 1rem;
            color: var(--text-color);
        }

        .card-header i {
            color: var(--accent-color);
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        select, input[type="text"], textarea {
            width: 100%;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.75rem;
            color: var(--text-color);
            font-family: inherit;
            font-size: 0.875rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        select:focus, input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            background: var(--accent-color);
            color: #0f172a;
            border: none;
            border-radius: 8px;
            padding: 0.75rem;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn:hover {
            background-color: #7dd3fc;
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* Main Content Workspace */
        .workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            height: 100%;
            overflow: hidden;
        }

        .player-container {
            flex: 1;
            min-height: 300px;
            max-height: calc(100% - 350px);
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            position: relative;
        }

        #video_player {
            width: 100%;
            height: 100%;
        }

        /* Logs Panel */
        .logs-panel {
            flex: 0 0 320px;
            display: flex;
            flex-direction: column;
            height: 320px;
        }

        .logs-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .logs-title {
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logs-container {
            flex: 1;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.8125rem;
        }

        .log-entry {
            margin-bottom: 0.5rem;
            line-height: 1.4;
            display: flex;
            flex-direction: column;
            padding: 0.5rem;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.02);
        }

        .log-time {
            color: var(--text-muted);
            font-size: 0.75rem;
            margin-bottom: 0.25rem;
        }

        .log-content {
            word-break: break-all;
        }

        .log-info { border-left: 2px solid var(--accent-color); }
        .log-success { border-left: 2px solid var(--success-color); }
        .log-error { border-left: 2px solid var(--error-color); }
        .log-warning { border-left: 2px solid var(--warning-color); }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <i data-lucide="tv"></i>
            <span>Simple CTV VAST Tester</span>
        </div>
        <div class="subtitle">Lightweight testing for Smart TV tags</div>
    </header>

    <main>
        <div class="sidebar">
            <!-- Configuration Card -->
            <div class="card">
                <div class="card-header">
                    <i data-lucide="sliders"></i>
                    <span>Configuration</span>
                </div>

                <div class="form-group">
                    <label for="ua_preset">Device Profile (User Agent)</label>
                    <select id="ua_preset">
                        <option value="Mozilla/5.0 (SMART-TV; LINUX; Tizen 6.0) AppleWebKit/537.36 (KHTML, like Gecko) 85.0.4183.93/6.0 TV Safari/537.36">Samsung Tizen (TV)</option>
                        <option value="Mozilla/5.0 (Web0S; Linux/SmartTV) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/79.0.3945.79 Safari/537.36 WebAppManager">LG WebOS (TV)</option>
                        <option value="Mozilla/5.0 (Linux; Android 9; SHIELD Android TV) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.114 Safari/537.36">Android TV / Shield</option>
                        <option value="Roku/DVP-9.10 (519.10E04111A)">Roku</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="player_mode">Player Mode</label>
                    <select id="player_mode">
                        <option value="sdkless">SDK-less (Custom VAST Parser)</option>
                        <option value="ima">IMA SDK (Google Standard)</option>
                    </select>
                </div>

                <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.25rem;">
                    <input type="checkbox" id="use_proxy" checked style="width: auto;">
                    <label for="use_proxy" style="margin-bottom: 0;">Use Local Proxy (Bypass CORS/UA)</label>
                </div>

                <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.25rem;">
                    <input type="checkbox" id="mock_consent" checked style="width: auto;">
                    <label for="mock_consent" style="margin-bottom: 0;">Mock Full Consent (CMP)</label>
                </div>

                <div class="form-group">
                    <label for="vast_tag">VAST/GAM Tag URL</label>
                    <textarea id="vast_tag" rows="4" placeholder="https://pubads.g.doubleclick.net/gampad/ads?..."></textarea>
                </div>

                <button id="btn_play" class="btn">
                    <i data-lucide="play"></i>
                    Play Ad
                </button>
            </div>

            <!-- Inspect Card -->
            <div class="card">
                <div class="card-header">
                    <i data-lucide="search"></i>
                    <span>Inspect XML (Bypass Player)</span>
                </div>
                <p class="text-xs text-gray-400 mb-3" style="font-size: 0.75rem; margin-bottom: 0.75rem;">Fetches the XML directly to check for fill/no-fill without playing.</p>
                <button id="btn_inspect" class="btn" style="background: rgba(255,255,255,0.1); color: white;">
                    <i data-lucide="terminal"></i>
                    Fetch VAST XML
                </button>
            </div>
        </div>

        <div class="workspace">
            <div class="player-container">
                <video id="video_player" class="video-js" controls playsinline>
                    <source src="https://vjs.zencdn.net/v/oceans.mp4" type="video/mp4">
                </video>
            </div>

            <div class="logs-panel card">
                <div class="logs-header">
                    <div class="logs-title">
                        <i data-lucide="activity"></i>
                        <span>Logs & Events</span>
                    </div>
                    <button id="btn_clear_logs" class="text-xs text-gray-400 hover:text-white" style="background: transparent; border: none; font-size: 0.75rem; cursor: pointer;">Clear</button>
                </div>
                <div id="logs_container" class="logs-container">
                    <div class="log-entry log-info">
                        <span class="log-time">System Ready</span>
                        <span class="log-content">Paste a tag and click Play or Fetch.</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/videojs-contrib-ads/7.1.0/videojs.ads.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/videojs-ima/2.1.0/videojs.ima.min.js"></script>
    <script src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script>

    <script>


        // Initialize Icons
        lucide.createIcons();

        // UI Elements
        const btnPlay = document.getElementById('btn_play');
        const btnInspect = document.getElementById('btn_inspect');
        const btnClearLogs = document.getElementById('btn_clear_logs');
        const vastTagInput = document.getElementById('vast_tag');
        const uaPresetSelect = document.getElementById('ua_preset');
        const logsContainer = document.getElementById('logs_container');
        const playerModeSelect = document.getElementById('player_mode');
        const useProxyCheckbox = document.getElementById('use_proxy');
        const mockConsentCheckbox = document.getElementById('mock_consent');

        // Initialize Video.js
        const player = videojs('video_player', {
            autoplay: false,
            controls: true,
            responsive: true,
            fluid: true
        });

        // Initialize IMA
        let imaOptions = {
            id: 'video_player',
            adsRenderingSettings: {
                enablePreloading: true
            }
        };
        
        // Wait for IMA to be ready
        let imaInitialized = false;
        
        // initIma logic merged into playWithIma

        function log(level, message, details = null) {
            const time = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = `log-entry log-${level}`;
            
            let html = `<span class="log-time">${time}</span><span class="log-content">${message}</span>`;
            if (details) {
                html += `<pre style="font-size: 0.75rem; margin-top: 5px; color: #a1a1aa; max-height: 150px; overflow-y: auto;">${escapeHtml(details)}</pre>`;
            }
            entry.innerHTML = html;
            
            logsContainer.prepend(entry);
        }

        function escapeHtml(text) {
            return String(text)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function xhrFetch(url, headers = {}) {
            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.open('GET', url);
                for (const key in headers) {
                    xhr.setRequestHeader(key, headers[key]);
                }
                xhr.onload = () => {
                    if (xhr.status >= 200 && xhr.status < 300) {
                        resolve(xhr.responseText);
                    } else {
                        reject(new Error(`XHR Status ${xhr.status}`));
                    }
                };
                xhr.onerror = () => reject(new Error('XHR Network Error'));
                xhr.send();
            });
        }

        btnClearLogs.addEventListener('click', () => {
            logsContainer.innerHTML = '';
            log('info', 'Logs cleared');
        });

        // Play Ad Logic
        btnPlay.addEventListener('click', async () => {
            const tag = vastTagInput.value.trim();
            if (!tag) {
                log('warning', 'Please paste a VAST tag URL first');
                return;
            }

            const mode = playerModeSelect.value;
            log('info', `Starting Ad Playback [${mode.toUpperCase()}] with tag: ` + tag.substring(0, 50) + '...');

            if (mode === 'ima') {
                playWithIma(tag);
            } else {
                playSdkLess(tag);
            }
        });

        function playWithIma(tag) {
            if (!imaInitialized) {
                let options = {
                    id: 'video_player',
                    adTagUrl: tag,
                    adsRenderingSettings: { enablePreloading: true }
                };
                try {
                    player.ima(options);
                    imaInitialized = true;
                    log('success', 'IMA SDK Initialized successfully with tag');
                    player.play();
                } catch (e) {
                    log('error', 'IMA Init failed: ' + e.message);
                }
            } else {
                try {
                    if (player.ima && player.ima.changeAdTag) {
                        player.ima.changeAdTag(tag);
                        player.ima.requestAds();
                        player.play();
                        log('success', 'IMA Tag changed successfully');
                    } else if (player.ima) {
                        player.ima.requestAds({ adTagUrl: tag });
                        player.play();
                        log('info', 'IMA requestAds sent');
                    } else {
                        log('error', 'IMA is initialized but player.ima is null. Cannot request ads.');
                    }
                } catch (e) {
                    log('error', 'IMA Change/Request failed: ' + e.message);
                }
            }
        }

        async function playSdkLess(tag) {
            log('info', 'Fetching VAST for SDK-less playback...');
            try {
                let fetchUrl = tag;
                
                if (mockConsentCheckbox.checked) {
                    const separator = fetchUrl.includes('?') ? '&' : '?';
                    if (!fetchUrl.includes('gdpr=')) fetchUrl += `${separator}gdpr=1`;
                    if (!fetchUrl.includes('gdpr_consent=')) fetchUrl += `&gdpr_consent=CQiCO8AQiCO8AB7F0BITCYFsAP_AAAAAAAAAMPtR_G__bXlr-bb36btkeYxf9_hr7sQxBgbJk24FzLvW7JwH32E7NAzatqYKmRIAu3TBIQNlHJDURUCgKIgVrzDMaE2U4TtKJ6BkiFMZQ2tYCFxvm4tjWQCY4ur_5ld9mR-t7dr82dzy26hnv3a9fuS1UJCdIYetDfv8ZBOT-9IE9-x8v4v4_MbpEm-eS1n_tGtp4jd6YvP_dBmxt-Tyff7Pn__rl_e7X__e_n3zv8oXX777____f_-7___2b_-___7___7YMBQFQAcADNAM-AjwBKoDtgIKARpAkQBJQCUYEyQKLAUcAqkBWACuYFqwLeAXsAwEAMEg9QAUABUAC4AHAAPAAgABIAC-AGQAagA8ACGAEwAKoAbwA_ACEgEMARIAjgBNACtAGAAMOAZQBlgDZAHOAO4Ae0A-wD9AIAARSAi4CMQEaARyAkQCTQE_AUGAqACrgFzAL0AYoA0QBtADcAHEAPaAh2BHoEigJpATsAocBR4CkQFNgLYAXAAuQBdgC7wF5gMNgZGBkgDJwGXAMzAZyAz6Bq4GsgNjAbQA28BuYDdQHJgOXAePA-MD5AH_AQEAgmBBgCEMELQQvgh6CH4EfQJFQSYBJkCWYEtwJfATAAmWBM4CaoE2AJuATmAnSBO4CeEFBwUIAoWBRUCkoFLgKZAU8gp-CoAFRgKnAVdArYBW8CvgFhQLHAWVAtNBawFrQLcgXFAvUBfcC_4GBwMFDoSQAC4AKAAqABwAEAAJIAXABfADIANQAeABMACmAFUALoAYgA3gB-gEMARIAjgBNACjAFaAMAAYYAygBogDZAHOAO4Ae0A-wD9gIoAjEBHAEmgJ-AoMBUQFXALEAXOAvIC9AGKANoAbgA4gB5gD2gH2AQgAh0BE4CL4EegSKAmQBNICdgFDwKPApABSYCmwFWALFAWwAt0BcAC5IF2AXaAu8BeYC-gGGgMegZGBkgDJwGVQMsAy4BmYDOQGfANNAarA1cDWAG0ANvAbqA4sByYDlwHjgPjAfMA-sB9wD-wH_AQBAgIBBgCFoEPQI7AR9AkIBIoCTIEq4JZgloBLoCXwEwAJlgTOAmqBNgCbgE5gJ0wTtBO4CeAE8wKDAUIAoWBRICioFJQKXAU8Ap-BUYCpwFXQK2AVvAsGBY8CyYFlYLWAtaBbkC3YFxQLlgXqAvuBgcDBQGEgMMQYbBhwDDxCB4AAsACgALgAagBVADEAG8APwAwABzgDuAIoARwAkQBKQCgwFRAVcAuYBigDaAIdAROAj0BNICkwFNgKsAWKAtEBcAC5AF2AMjAZOAzkBqoDxwHxgP7AgIBBgCFoEPQJCASKAl0BM4CbAE5gJ3ATwAnmBQYCioFJQKXAU_AsEBa0C3JKCqAAsACgAHAASAA8ACGAEwAKoAYoBDAESAI4AUYArQBgADZAH4ARyAqICrgFzAMUAcQBCACHQEXwI9AkUBR4Ck4FNAU2AsUBbAC5AF2ALzgZGBkgDJwGWAM5AZ8A1gBt4D4wIAgQEAgeBBgCEIEPQI-gSKAkqBKsCVoEugJfATOAmqBNgCbgE5oJ2gncBPACeYFFQKSgUuAp4BUYCpwFbAK3wWCBYMCxYFjwLKgWegtYC1oFuQLkAXLAvUBfcDBQGEgMMAYbKQdwAFwAUABUADgAIIAZABoADwAIYATAAqgBiAD9AIYAiQBHACjAFaAMAAZQA0QBsgDnAHfAPsA_QCLAEYgI4AkoBQYCogKuAXMAvIBigDaAG4AOIAe0A-wCHQETgIvgR6BIoCaQE7AKHAUgApOBTQFNgKsAWKAtgBcAC5IF2AXaAu8BeMBfQDDYGRgZIAyeBlgGXAM5gawBrIDZQG3gN1AcmA8UB44D4wHzAP7A                     if (!fetchUrl.includes('addtl_consent=')) fetchUrl += `&addtl_consent=2~89.1301.2577.70.587.2403.2535.3095.3100~dv.`;
                }

                if (useProxyCheckbox.checked) {
                    fetchUrl = `http://localhost:8085/?url=${encodeURIComponent(fetchUrl)}&ua=${encodeURIComponent(uaPresetSelect.value)}`;
                }
                
                const xml = await xhrFetch(fetchUrl, { 'Accept': 'application/xml' });
                
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xml, 'text/xml');
                
                // 1. Find MediaFile
                const mediaFiles = xmlDoc.getElementsByTagName('MediaFile');
                let mediaUrl = '';
                for (let i = 0; i < mediaFiles.length; i++) {
                    const type = mediaFiles[i].getAttribute('type');
                    if (type === 'video/mp4' || type === 'video/webm') {
                        mediaUrl = mediaFiles[i].textContent.trim();
                        break;
                    }
                }
                
                if (!mediaUrl && mediaFiles.length > 0) {
                    mediaUrl = mediaFiles[0].textContent.trim();
                }

                if (!mediaUrl) {
                    log('warning', 'No MediaFile found in VAST response');
                    return;
                }

                log('success', 'Found MediaFile: ' + mediaUrl.substring(0, 60) + '...');

                // 2. Find Tracking
                const impressions = xmlDoc.getElementsByTagName('Impression');
                const trackingEvents = xmlDoc.getElementsByTagName('Tracking');
                
                const trackingMap = {
                    start: [], firstQuartile: [], midpoint: [], thirdQuartile: [], complete: []
                };

                for (let i = 0; i < impressions.length; i++) {
                    trackingMap.start.push(impressions[i].textContent.trim());
                }

                for (let i = 0; i < trackingEvents.length; i++) {
                    const event = trackingEvents[i].getAttribute('event');
                    if (trackingMap[event]) {
                        trackingMap[event].push(trackingEvents[i].textContent.trim());
                    }
                }

                // 3. Play and Track
                player.src({ src: mediaUrl, type: 'video/mp4' });
                player.play();

                log('info', 'Playing MediaFile directly. Setting up tracking listeners...');

                setupTrackingListeners(trackingMap);

            } catch (e) {
                log('error', 'SDK-less failed: ' + e.message);
            }
        }

        let activeTrackingListeners = [];

        function setupTrackingListeners(trackingMap) {
            // Clear old listeners
            activeTrackingListeners.forEach(l => player.off('timeupdate', l));
            activeTrackingListeners = [];

            const fired = { start: false, firstQuartile: false, midpoint: false, thirdQuartile: false, complete: false };

            const timeListener = () => {
                const cur = player.currentTime();
                const dur = player.duration();
                if (!dur) return;

                const progress = cur / dur;

                if (!fired.start && cur > 0) {
                    fireTrackingGroup('Impression (Start)', trackingMap.start);
                    fired.start = true;
                }
                if (!fired.firstQuartile && progress >= 0.25) {
                    fireTrackingGroup('First Quartile', trackingMap.firstQuartile);
                    fired.firstQuartile = true;
                }
                if (!fired.midpoint && progress >= 0.50) {
                    fireTrackingGroup('Midpoint', trackingMap.midpoint);
                    fired.midpoint = true;
                }
                if (!fired.thirdQuartile && progress >= 0.75) {
                    fireTrackingGroup('Third Quartile', trackingMap.thirdQuartile);
                    fired.thirdQuartile = true;
                }
                if (!fired.complete && progress >= 0.99) {
                    fireTrackingGroup('Complete', trackingMap.complete);
                    fired.complete = true;
                }
            };

            player.on('timeupdate', timeListener);
            activeTrackingListeners.push(timeListener);
        }

        function fireTrackingGroup(name, urls) {
            if (!urls || urls.length === 0) {
                log('info', `No tracking URLs for ${name}`);
                return;
            }

            log('info', `Firing ${name} tracker (${urls.length} URLs)`);
            urls.forEach(url => {
                fetch(url, { mode: 'no-cors' })
                    .then(() => log('success', `✔ Fired ${name}: ${url.substring(0, 50)}...`))
                    .catch(e => log('warning', `✖ Failed to fire ${name}: ${e.message}`));
            });
        }

                    if (!fetchUrl.includes('addtl_consent=')) fetchUrl += `&addtl_consent=2~89.1301.2577.70.587.2403.2535.3095.3100~dv.`;
                }

                if (useProxyCheckbox.checked) {
                    fetchUrl = `http://localhost:8085/?url=${encodeURIComponent(fetchUrl)}&ua=${encodeURIComponent(uaPresetSelect.value)}`;
                }

                const xml = await xhrFetch(fetchUrl, { 'Accept': 'application/xml' });
                
                if (xml.includes('<VAST')) {
                    log('success', 'Valid VAST XML Received!', xml);
                } else if (xml.trim() === '') {
                    log('warning', 'Empty response received (204 No Ad)');
                } else {
                    log('warning', 'Received response but it might not be valid VAST XML', xml);
                }
            } catch (e) {
                log('error', 'Fetch failed (likely CORS or Network Issue): ' + e.message);
                log('warning', 'Check browser DevTools console for details. CORS errors happen when the server doesn\'t allow requests from localhost.');
            }
        });

        // Event Listeners for Player
        player.on('play', () => log('info', 'Content video play event'));
        player.on('pause', () => log('info', 'Content video pause event'));
        
        // Listen for IMA errors
        player.on('adserror', (e) => {
            log('error', 'Ad Error: ' + (e.data?.message || 'Unknown error'));
        });
