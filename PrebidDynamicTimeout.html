<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prebid Dynamic Timeout Calculator</title>
  <style>
    :root {
      --bg-color: #0f172a;
      --text-color: #f8fafc;
      --accent-color: #38bdf8;
      --card-bg: #1e293b;
      --border-color: #334155;
      --success-color: #00e676;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      max-width: 600px;
      width: 100%;
      background: var(--card-bg);
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 20px 50px -10px rgba(0, 0, 0, 0.5);
      border: 1px solid var(--border-color);
    }

    h1 {
      color: var(--accent-color);
      margin-top: 0;
      text-align: center;
      font-size: 1.8rem;
      margin-bottom: 30px;
    }

    .control-panel {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 0.9rem;
      font-weight: 500;
      color: #94a3b8;
    }

    input[type="range"], select, input[type="checkbox"] {
      accent-color: var(--accent-color);
    }

    select {
      background: #0f172a;
      color: white;
      border: 1px solid var(--border-color);
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .slider-val {
      font-size: 0.85rem;
      color: var(--accent-color);
      font-weight: 600;
    }

    .timeout-display {
      background: #0f172a;
      padding: 30px;
      border-radius: 16px;
      text-align: center;
      margin-top: 20px;
      border: 2px solid var(--accent-color);
      box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
    }

    .timeout-display h3 {
      margin: 0 0 10px 0;
      font-size: 1rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .timeout-val {
      font-size: 3.5rem;
      font-weight: bold;
      color: var(--accent-color);
      text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
    }

    /* Custom Checkbox as Toggle */
    .switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 24px;
    }

    .switch input { 
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #334155;
      transition: .4s;
      border-radius: 24px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: var(--accent-color);
    }

    input:checked + .slider:before {
      transform: translateX(26px);
    }

    .row-flex {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Prebid Timeout Calculator</h1>
    
    <div class="control-panel">
      
      <!-- New vs Returning User -->
      <div class="control-group">
        <div class="row-flex">
          <div>
            <label for="isNewUser">First Visit (localStorage.getItem('cookie'))</label>
            <div style="font-size: 0.75rem; color: #64748b;">Adds buffer for asset loading</div>
          </div>
          <label class="switch">
            <input type="checkbox" id="isNewUser" checked onchange="calculateTimeout()">
            <span class="slider"></span>
          </label>
        </div>
      </div>
      <!-- Includes Video -->
      <div class="control-group">
        <div class="row-flex">
          <label for="includesVideo">Includes Video (adUnit.mediaTypes.video)</label>
          <label class="switch">
            <input type="checkbox" id="includesVideo" onchange="calculateTimeout()">
            <span class="slider"></span>
          </label>
        </div>
      </div>


      <!-- Number of Ad Units -->
      <div class="control-group">
        <div class="row-flex">
          <label for="numAdUnits">Number of Ad Units (pbjs.adUnits.length)</label>
          <span id="adUnitsVal" class="slider-val">1</span>
        </div>
        <input type="range" id="numAdUnits" min="1" max="15" value="1" oninput="updateAdUnitsVal(); calculateTimeout();">
      </div>

      <!-- Page Content Type -->
      <div class="control-group">
        <label for="pageType">Page Content Type</label>
        <select id="pageType" onchange="calculateTimeout()">
          <option value="homepage">Homepage (+200ms)</option>
          <option value="section">Section Page (+100ms)</option>
          <option value="article">Article (+50ms)</option>
        </select>
      </div>

      <!-- Device Type -->
      <div class="control-group">
        <div class="row-flex">
          <label for="deviceType">Device Type (navigator.userAgent / window.innerWidth)</label>
          <span id="deviceTypeVal" class="slider-val">Desktop (+50)</span>
        </div>
        <input type="range" id="deviceType" min="1" max="3" value="3" oninput="calculateTimeout();">
      </div>

      <!-- Connection Speed -->
      <div class="control-group">
        <div class="row-flex">
          <label for="connectionSpeed">Connection Speed (navigator.connection.effectiveType)</label>
          <span id="connectionSpeedVal" class="slider-val">4g (+50)</span>
        </div>
        <input type="range" id="connectionSpeed" min="1" max="4" value="4" oninput="calculateTimeout();">
      </div>

      <!-- Timeout Display -->
      <div class="timeout-display">
        <h3>Calculated Bidder Timeout</h3>
        <div class="timeout-val" id="totalTimeout">1320ms</div>
        <div style="font-size: 0.8rem; color: #94a3b8; margin-top: 5px;">Base (500ms) + Modifiers</div>
      </div>

    </div>
  </div>

  <script>
    function updateAdUnitsVal() {
      document.getElementById("adUnitsVal").textContent = document.getElementById("numAdUnits").value;
    }

    function calculateTimeout() {
      const baseTimeout = 500; // Base timeout
      let modifier = 0;

      // 1. New vs Returning User
      const isNewUser = document.getElementById("isNewUser").checked;
      modifier += isNewUser ? 200 : 0;

      // Includes Video
      const includesVideo = document.getElementById("includesVideo").checked;
      modifier += includesVideo ? 200 : 50;

      // 2. Number of Ad Units
      const numUnits = parseInt(document.getElementById("numAdUnits").value);
      modifier += numUnits * 20;

      // 3. Page Content Type
      const pageType = document.getElementById("pageType").value;
      if (pageType === "homepage") modifier += 200;
      else if (pageType === "section") modifier += 100;
      else if (pageType === "article") modifier += 50;

      // 4. Device Type (Sorted slower to faster: Phone -> Tablet -> Desktop)
      const deviceVal = document.getElementById("deviceType").value;
      if (deviceVal === "1") { modifier += 200; document.getElementById("deviceTypeVal").textContent = "Phone (+200)"; }
      else if (deviceVal === "2") { modifier += 100; document.getElementById("deviceTypeVal").textContent = "Tablet (+100)"; }
      else if (deviceVal === "3") { modifier += 50; document.getElementById("deviceTypeVal").textContent = "Desktop (+50)"; }

      // 5. Connection Speed (Standard effectiveType)
      const connVal = document.getElementById("connectionSpeed").value;
      if (connVal === "1") { modifier += 250; document.getElementById("connectionSpeedVal").textContent = "slow-2g (+250)"; }
      else if (connVal === "2") { modifier += 200; document.getElementById("connectionSpeedVal").textContent = "2g (+200)"; }
      else if (connVal === "3") { modifier += 100; document.getElementById("connectionSpeedVal").textContent = "3g (+100)"; }
      else if (connVal === "4") { modifier += 50; document.getElementById("connectionSpeedVal").textContent = "4g (+50)"; }

      const total = baseTimeout + modifier;
      document.getElementById("totalTimeout").textContent = total + "ms";
    }

    // Initialize
    updateAdUnitsVal();
    calculateTimeout();
  </script>

</body>
</html>
