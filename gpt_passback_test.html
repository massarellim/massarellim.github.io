<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPT Passback Test</title>
    <!-- Fake CMP always returning full consent -->
    <script>
      // Add locator frame to ensure GPT and Prebid can detect the CMP's presence
      if (!window.__tcfapiLocator) {
        var frame = document.createElement('iframe');
        frame.name = '__tcfapiLocator';
        frame.style.display = 'none';
        document.head.appendChild(frame);
      }

      window.__tcfapi = function(command, version, callback, parameter) {
        if (command === 'addEventListener' || command === 'getTCData') {
          var tcData = {
            tcString: 'CPq0bWAPq0bWAAGABCENCuEgAIAAAIAAAgAAAAIAAAQAIAAAAAA.YAAAAAAAAAAA',
            cmpId: 999,
            cmpVersion: 1,
            tcfPolicyVersion: 2,
            gdprApplies: true,
            eventStatus: 'tcloaded',
            cmpStatus: 'loaded',
            listenerId: 1,
            purpose: {
              consents: {1: true, 2: true, 3: true, 4: true, 5: true, 6: true, 7: true, 8: true, 9: true, 10: true},
              legitimateInterests: {1: true, 2: true, 3: true, 4: true, 5: true, 6: true, 7: true, 8: true, 9: true, 10: true}
            },
            vendor: {
              consents: {755: true}, // Google
              legitimateInterests: {755: true}
            }
          };
          // Synchronous callback is often more reliable for simple static fake CMPs
          if (typeof callback === 'function') {
            callback(tcData, true);
          }
        }
      };
    </script>

    <!-- Standalone ID5 API (for Google Deploy use cases) -->
    <script async src="https://cdn.id5-sync.com/api/1.0/id5-api.js"></script>
    <script>
      var id5Status = id5Status || {};
      id5Status.ready = id5Status.ready || false;
      
      window.id5Callback = function() {
        if (!id5Status.ready) {
           id5Status.ready = true;
           window.ID5.init({
             partnerId: 173,
             cmpApi: 'iab',
             abTesting: {
               enabled: false
             }
           });
        }
      };

      // Poll or wait for the script to load
      var checkId5 = setInterval(function() {
        if (window.ID5 && window.ID5.init) {
          clearInterval(checkId5);
          window.id5Callback();
        }
      }, 50);
    </script>

    <!-- Prebid.js Setup -->
    <!-- Using a CDN hosted Prebid.js. Note: standard CDNs may not have all optional modules built-in. -->
    <script async src="https://cdn.jsdelivr.net/npm/prebid.js@latest/dist/prebid.js"></script>
    <script>
      var pbjs = pbjs || {};
      pbjs.que = pbjs.que || [];
      
      pbjs.que.push(function() {
        pbjs.setConfig({
          debug: true,
          consentManagement: {
            gdpr: {
              cmpApi: 'iab',
              timeout: 1000,
              defaultGdprScope: true
            }
          },
          userSync: {
            userIds: [
              {
                name: "pubCommonId",
                storage: {
                  type: "html5",
                  name: "_pubcid",
                  expires: 365
                }
              },
              {
                name: "criteo"
              },
              {
                name: "id5Id",
                params: {
                  partner: 173 // ID5 often uses 173 in their test/example configurations
                },
                storage: {
                  type: "html5",
                  name: "id5id",
                  expires: 90,
                  refreshInSeconds: 8 * 3600
                }
              }
            ],
            syncEnabled: true,
            filterSettings: {
              all: {
                bidders: '*',
                filter: 'include'
              }
            }
          }
        });
      });
    </script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        #gpt-passback {
            border: 1px dashed #ccc;
            min-height: 250px;
            min-width: 300px;
            display: inline-block;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>GPT Passback Test Page</h1>
    <p>This page contains the GPT passback tag provided.</p>

    <!-- GPT Passback Tag -->
    <script async src="https://securepubads.g.doubleclick.net/tag/js/gpt.js" crossorigin="anonymous"></script>
    <div id="gpt-passback">
      <script>
        window.googletag = window.googletag || {cmd: []};
        googletag.cmd.push(function() {
          var slot = googletag.defineSlot('/6353/massarellim_test', [[300, 600], [160, 600], 'fluid', [300, 250]], 'gpt-passback').addService(googletag.pubads());
          
          // Disable initial load so we can wait for Prebid
          googletag.pubads().disableInitialLoad();
          googletag.enableServices();
          googletag.display('gpt-passback');

          // Request bids and refresh the slot
          pbjs.que.push(function() {
            pbjs.requestBids({
              bidsBackHandler: function() {
                pbjs.setTargetingForGPTAsync([slot]);
                googletag.pubads().refresh([slot]);
              }
            });
          });
        });
      </script>
    </div>
</body>
</html>
