<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPT Passback Test</title>
    <!-- Fake CMP always returning full consent -->
    <script>
      // Add locator frame to ensure GPT and Prebid can detect the CMP's presence
      if (!window.__tcfapiLocator) {
        var frame = document.createElement('iframe');
        frame.name = '__tcfapiLocator';
        frame.style.display = 'none';
        document.head.appendChild(frame);
      }

      window.__tcfapi = function(command, version, callback, parameter) {
        if (command === 'addEventListener' || command === 'getTCData') {
          var tcData = {
            tcString: 'CPq0bWAPq0bWAAGABCENCuEgAIAAAIAAAgAAAAIAAAQAIAAAAAA.YAAAAAAAAAAA',
            cmpId: 999,
            cmpVersion: 1,
            tcfPolicyVersion: 2,
            gdprApplies: true,
            eventStatus: 'tcloaded',
            cmpStatus: 'loaded',
            listenerId: 1,
            purpose: {
              consents: {1: true, 2: true, 3: true, 4: true, 5: true, 6: true, 7: true, 8: true, 9: true, 10: true},
              legitimateInterests: {1: true, 2: true, 3: true, 4: true, 5: true, 6: true, 7: true, 8: true, 9: true, 10: true}
            },
            vendor: {
              consents: {32: true, 91: true, 755: true}, // AppNexus, Criteo, Google
              legitimateInterests: {32: true, 91: true, 755: true}
            }
          };
          // GPT's TCF listener often crashes if the callback fires synchronously.
          // Using a setTimeout ensures the script doesn't blow up the call stack.
          if (typeof callback === 'function') {
            setTimeout(function() {
              callback(tcData, true);
            }, 0);
          }
        }
      };
    </script>

    <!-- Standalone ID5 API (for Google Deploy use cases) -->
    <script async src="https://cdn.id5-sync.com/api/1.0/id5-api.js"></script>
    <script>
      var id5Status = id5Status || {};
      id5Status.ready = id5Status.ready || false;
      
      window.id5Callback = function() {
        if (!id5Status.ready) {
           id5Status.ready = true;
           window.ID5.init({
             partnerId: 173,
             cmpApi: 'iab',
             abTesting: {
               enabled: false
             }
           });
        }
      };

      // Poll or wait for the script to load
      var checkId5 = setInterval(function() {
        if (window.ID5 && window.ID5.init) {
          clearInterval(checkId5);
          window.id5Callback();
        }
      }, 50);
    </script>

    <!-- Prebid.js Setup -->
    <!-- Using the not-for-prod build which includes all optional modules natively -->
    <script async src="//cdn.jsdelivr.net/npm/prebid.js@latest/dist/not-for-prod/prebid.js"></script>
      <script>
        window.googletag = window.googletag || {cmd: []};
        var pbjs = pbjs || {};
        pbjs.cmd = pbjs.cmd || [];
        
        googletag.cmd.push(function() {
          var slot = googletag.defineSlot('/6353/massarellim_test', [300, 250], 'gpt-passback')
             .addService(googletag.pubads());
             
          googletag.pubads().disableInitialLoad();
          googletag.enableServices();
          
          googletag.display('gpt-passback');

          pbjs.cmd.push(function() {
            pbjs.addAdUnits([{
              code: '/6353/massarellim_test',
              mediaTypes: {
                banner: {
                  sizes: [[300, 250]]
                }
              },
              bids: [{
                bidder: 'appnexus',
                params: {
                   placementId: 13144370 
                }
              }]
            }]);
            
            pbjs.setConfig({
              debug: true,
              debugging: {
                enabled: true,
                intercept: [
                  {
                    when: {
                      adUnitCode: '/6353/massarellim_test',
                      bidder: 'appnexus'
                    },
                    then: {
                      cpm: 9.90
                    }
                  }
                ]
              },
              consentManagement: {
                gdpr: {
                  cmpApi: 'iab',
                  timeout: 1000,
                  defaultGdprScope: true
                }
              },
              userSync: {
                userIds: [
                  {
                    name: "pubCommonId",
                    storage: {
                      type: "html5",
                      name: "_pubcid",
                      expires: 365
                    }
                  },
                  {
                    name: "criteo"
                  }
                ],
                syncEnabled: true,
                filterSettings: {
                  all: {
                    bidders: '*',
                    filter: 'include'
                  }
                }
              }
            });

            pbjs.requestBids({
              bidsBackHandler: function(){
                if (pbjs.initAdserverSet) return;
                pbjs.initAdserverSet = true;
                
                pbjs.setTargetingForGPTAsync();
                googletag.pubads().refresh();
              },
              timeout: 1500
            });
         
          })    
        });
      </script>
    </div>
</body>
</html>
