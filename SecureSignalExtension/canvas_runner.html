<!DOCTYPE html>
<html>
<body>
<canvas id="c16" width="16" height="16"></canvas>
<canvas id="c48" width="48" height="48"></canvas>
<canvas id="c128" width="128" height="128"></canvas>
<script>
    async function colorize(srcPath, canvasId) {
        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
                const c = document.getElementById(canvasId);
                const ctx = c.getContext("2d");
                ctx.drawImage(img, 0, 0);
                
                ctx.globalCompositeOperation = "source-in";
                ctx.fillStyle = "#4CAF50";
                ctx.fillRect(0, 0, c.width, c.height);
                
                ctx.globalCompositeOperation = "multiply";
                ctx.drawImage(img, 0, 0);
                
                ctx.globalCompositeOperation = "destination-in";
                ctx.drawImage(img, 0, 0);
                
                resolve(c.toDataURL("image/png"));
            };
            img.src = srcPath;
        });
    }

    async function run() {
        const b16 = await colorize("icons/icon16.png", "c16");
        const b48 = await colorize("icons/icon48.png", "c48");
        const b128 = await colorize("icons/icon128.png", "c128");
        
        console.log(JSON.stringify({16: b16, 48: b48, 128: b128}));
    }
    run();
</script>
</body>
</html>
