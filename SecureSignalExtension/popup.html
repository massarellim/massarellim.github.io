<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Secure Signal Monitor</title>
    <link rel="stylesheet" href="popup.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="header">
        <svg class="icon" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z" stroke="#4ade80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M12 16V12" stroke="#4ade80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M12 8H12.01" stroke="#4ade80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <h2>Secure Signals</h2>
    </div>
    
    <div class="tabs">
        <div class="tab active" data-tab="shared">Shared (<span id="count-shared">0</span>)</div>
        <div class="tab" data-tab="gam">GAM Only (<span id="count-gam">0</span>)</div>
        <div class="tab" data-tab="prebid">Prebid Only (<span id="count-prebid">0</span>)</div>
    </div>
    
    <div class="container active" id="signals-shared">
        <div class="message"><div class="loader"></div>Searching...</div>
    </div>
    <div class="container" id="signals-gam">
        <div class="message"><div class="loader"></div>Searching...</div>
    </div>
    <div class="container" id="signals-prebid">
        <div class="message"><div class="loader"></div>Searching...</div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
