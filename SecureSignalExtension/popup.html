<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Secure Signal Monitor</title>
    <link rel="stylesheet" href="popup.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
        <div class="header">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="url(#gradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <defs>
                    <linearGradient id="gradient" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse">
                        <stop stop-color="#3b82f6"/>
                        <stop offset="1" stop-color="#8b5cf6"/>
                    </linearGradient>
                </defs>
                <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
            </svg>
            <h1>Secure Signals</h1>
        </div>
        
        <div class="diagnostics-panel" id="diagnosticsPanel">
            <!-- Timeouts populate here -->
        </div>

        <div class="tabs">
        <div class="tab active" data-tab="shared">Shared (<span id="count-shared">0</span>)</div>
        <div class="tab" data-tab="gam">GAM Only (<span id="count-gam">0</span>)</div>
        <div class="tab" data-tab="prebid">Prebid Only (<span id="count-prebid">0</span>)</div>
    </div>
    
    <div class="container active" id="signals-shared">
        <div class="message"><div class="loader"></div>Searching...</div>
    </div>
    <div class="container" id="signals-gam">
        <div class="message"><div class="loader"></div>Searching...</div>
    </div>
    <div class="container" id="signals-prebid">
        <div class="message"><div class="loader"></div>Searching...</div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
