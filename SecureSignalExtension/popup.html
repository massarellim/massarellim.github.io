<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
  <title>Secure Signal Inspector</title>
</head>
<body>
  <div class="container">
    <header class="header" style="display: flex; justify-content: space-between; align-items: center;">
      <h1 style="margin: 0;">Secure Signal Inspector</h1>
      <div class="toggle-container" style="display: flex; align-items: center; gap: 8px;">
        <span id="toggle-label" style="font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase;">OFF</span>
        <label class="switch">
          <input type="checkbox" id="power-toggle">
          <span class="slider round"></span>
        </label>
      </div>
    </header>

    <main id="main-content">
      <div id="loading" class="text-center">Loading signals...</div>
      
      <div id="results" class="hidden">
        <div class="summary-cards">
          <div class="card stat-card">
            <h3>Signals Detected on Page</h3>
            <p id="stat-injected">0</p>
            <div id="stat-injected-breakdown" style="font-size: 11px; color: var(--text-muted); margin-top: 4px; font-weight: 500;"></div>
          </div>
          <div class="card stat-card">
            <h3>Signals Actually Sent to GAM</h3>
            <p id="stat-network">0</p>
            <div id="stat-network-breakdown" style="font-size: 11px; color: var(--text-muted); margin-top: 4px; font-weight: 500;"></div>
          </div>
        </div>

        <h2 class="section-title">Reconciled Signals</h2>
        <div id="reconciled-list"></div>

        <h2 class="section-title" style="margin-top: 24px;">Decoded Network Requests</h2>
        <div id="network-list"></div>
      </div>
    </main>
  </div>
  <script src="popup.js"></script>
</body>
</html>
