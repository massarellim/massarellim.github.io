<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
  <title>Secure Signal Validator</title>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Secure Signal Validator</h1>
      <p class="subtitle">Intercepted vs Network Sent</p>
    </header>

    <main id="main-content">
      <div id="loading" class="text-center">Loading signals...</div>
      
      <div id="results" class="hidden">
        <div class="summary-cards">
          <div class="card stat-card">
            <h3>Injected Signals</h3>
            <p id="stat-injected">0</p>
          </div>
          <div class="card stat-card">
            <h3>Network Encoded (a3p/ssj)</h3>
            <p id="stat-network">0</p>
          </div>
        </div>

        <h2 class="section-title">Reconciled Signals</h2>
        <div id="reconciled-list"></div>
      </div>
    </main>
  </div>
  <script src="popup.js"></script>
</body>
</html>
